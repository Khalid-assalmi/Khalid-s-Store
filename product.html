<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalid's Store/Product information</title>
    <link rel="stylesheet" href="datas.style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body dir="rtl">
    <div class="back"><a onclick="window.history.go(-1)"><i class="fas fa-arrow-right"></i></a></div>
    <div class="productDatas">
        <div class="productImage"></div>
       <div class="productInfo">
            <div class="price">0.00$</div>
            <div class="description"><span id="text">الوصف:</span><span id="productDes"></span></div>
       </div>
    </div>
    <button id="addToCart" title="إضافة إلى السلة"><span class="addToCartText">إضافة للسلة</span><i class="fa-solid fa-cart-plus"></i></button>
    <script src="script.js"></script>
    <script src="ShoppingCart.js"></script>
</body>
</html>
