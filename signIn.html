<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalid's Store/Sign in</title>
    <link rel="stylesheet" href="signIn.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body dir="rtl">
    <div class="back"><a onclick="window.history.go(-1)"><i class="fas fa-arrow-right"></i></a></div>
    <div class="box">
        <h2>تسجيل الدخول</h2>
        <form>
            <div class="inputBox">
                <label>اسم المستخدم</label>
                <input type="text" name="username" required placeholder="ادخل اسم المستخدم هنا">
                <label>البريد الالكتروني</label>
                <input type="email" name="email" required placeholder="ادخل البريد الالكتروني هنا">
                <label>كلمة المرور</label>
                <input type="password" name="password" required placeholder="ادخل كلمة المرور هنا">
            </div>
            <input type="submit" value="تسجيل الدخول">
        </form>
    </div>
</body>
</html>
